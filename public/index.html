<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP 求職助手</title>
<style>
  :root {
    --primary: #c0392b;
    --primary-dark: #a93226;
    --primary-light: #f5e6e6;
    --bg: #f8f9fa;
    --card: #ffffff;
    --border: #e0e0e0;
    --text: #2c3e50;
    --text-muted: #7f8c8d;
    --success: #27ae60;
    --warning: #f39c12;
    --blue: #2980b9;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  header {
    background: var(--primary);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 1.3rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  header h1 span.logo {
    background: white;
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 900;
    font-size: 1rem;
  }

  .header-subtitle {
    font-size: 0.8rem;
    opacity: 0.85;
    margin-top: 2px;
  }

  #profileBtn {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.5);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #profileBtn:hover { background: rgba(255,255,255,0.25); }

  .model-badge {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.9);
    font-size: 0.72rem;
    padding: 3px 8px;
    border-radius: 10px;
    font-family: monospace;
    white-space: nowrap;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .profile-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #f39c12;
  }
  .profile-dot.set { background: #2ecc71; }

  /* Search bar */
  .search-section {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    max-width: 900px;
    margin: 0 auto;
  }

  .search-row input {
    flex: 1;
    padding: 10px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  .search-row input:focus { border-color: var(--primary); }

  .search-row select {
    padding: 10px 12px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 0.9rem;
    outline: none;
    background: white;
    cursor: pointer;
    font-family: inherit;
  }

  .btn {
    padding: 10px 20px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    transition: all 0.2s;
    font-family: inherit;
  }

  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; }

  .btn-secondary {
    background: #ecf0f1;
    color: var(--text);
  }
  .btn-secondary:hover { background: #dce1e7; }

  .btn-gmail {
    background: #4285f4;
    color: white;
    font-size: 1rem;
    padding: 12px 24px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }
  .btn-gmail:hover { background: #3367d6; }
  .btn-gmail:disabled { background: #ccc; cursor: not-allowed; }

  .btn-copy {
    background: #ecf0f1;
    color: var(--text);
    font-size: 0.85rem;
    padding: 6px 14px;
    border-radius: 6px;
  }
  .btn-copy:hover { background: #dce1e7; }

  /* Main layout */
  .main-layout {
    display: flex;
    height: calc(100vh - 121px);
    max-width: 1400px;
    margin: 0 auto;
  }

  /* Job list panel */
  .jobs-panel {
    width: 360px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: white;
    display: flex;
    flex-direction: column;
  }

  .jobs-panel-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-muted);
    background: #fafafa;
    flex-shrink: 0;
  }

  .job-card {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .job-card:hover { background: var(--primary-light); }
  .job-card.active { background: var(--primary-light); border-left: 3px solid var(--primary); }

  .job-card-title {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.4;
  }

  .job-card-company {
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .job-card-date {
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .load-more-wrap {
    padding: 12px;
    text-align: center;
    flex-shrink: 0;
  }

  /* Panel tabs */
  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: #fafafa;
    flex-shrink: 0;
  }

  .panel-tab {
    flex: 1;
    padding: 10px 6px;
    font-size: 0.78rem;
    font-weight: 600;
    text-align: center;
    cursor: pointer;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }

  .panel-tab:hover { color: var(--primary); background: var(--primary-light); }
  .panel-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: white; }

  .panel-tab .tab-badge {
    display: inline-block;
    background: var(--primary);
    color: white;
    border-radius: 10px;
    font-size: 0.68rem;
    padding: 1px 5px;
    margin-left: 3px;
    vertical-align: middle;
    line-height: 1.4;
  }

  /* Star button on job cards */
  .job-card {
    position: relative;
  }

  .star-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 4px;
    color: #ccc;
    transition: color 0.15s, transform 0.1s;
    z-index: 1;
  }

  .star-btn:hover { color: #f39c12; transform: scale(1.2); }
  .star-btn.starred { color: #f39c12; }

  /* History items */
  .history-item {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .history-item:hover { background: var(--primary-light); }

  .history-sent-badge {
    display: inline-block;
    background: #e8f5e9;
    color: #2e7d32;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 4px;
    margin-bottom: 4px;
  }

  .history-date {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .empty-panel {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-muted);
    font-size: 0.9rem;
    line-height: 1.7;
  }

  .empty-panel .icon { font-size: 2rem; margin-bottom: 10px; }

  /* Detail panel */
  .detail-panel {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .empty-state .icon { font-size: 3rem; }
  .empty-state h3 { font-size: 1.1rem; color: var(--text); }
  .empty-state p { font-size: 0.9rem; line-height: 1.6; }

  /* Job header */
  .job-header-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px 24px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
  }

  .job-header-card h2 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text);
  }

  .job-header-card .company-name {
    font-size: 1rem;
    color: var(--primary);
    font-weight: 600;
    margin-bottom: 12px;
  }

  .job-meta-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
  }

  .meta-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.82rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .meta-chip.email { color: var(--blue); cursor: pointer; }
  .meta-chip.email:hover { background: #e8f0fe; }

  .view-original-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    color: var(--primary);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
  }

  .view-original-link:hover { text-decoration: underline; }

  /* Requirements card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fafafa;
  }

  .card-header h3 {
    font-size: 1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-body { padding: 16px 20px; }

  .checklist {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  .checklist-item:hover { background: #f9f9f9; }
  .checklist-item.checked { background: #f0faf4; border-color: #a8d5b5; }

  .checklist-item input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--success);
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .checklist-item-text {
    flex: 1;
    font-size: 0.9rem;
    line-height: 1.4;
  }

  .checklist-item.checked .checklist-item-text {
    color: var(--success);
  }

  .checklist-category {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    background: var(--primary-light);
    padding: 2px 8px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  .checklist-progress {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 10px;
    height: 6px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-bar {
    height: 100%;
    background: var(--success);
    border-radius: 10px;
    transition: width 0.3s;
  }

  /* Cover letter card */
  .cover-letter-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #coverLetterText {
    display: none; /* hidden — used only for copy/Gmail */
  }

  #coverLetterDisplay {
    width: 100%;
    min-height: 280px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    font-size: 0.9rem;
    font-family: inherit;
    line-height: 1.8;
    white-space: pre-wrap;
    background: #fafafa;
    color: var(--text);
    cursor: text;
  }

  #coverLetterDisplay .letter-subject {
    display: block;
    text-align: center;
    font-weight: 700;
    margin: 4px 0;
  }

  .gmail-section {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .gmail-to-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .gmail-to-row label {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .gmail-to-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .gmail-to-row input:focus { border-color: var(--blue); }

  .subject-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }

  .subject-row label {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .subject-row input {
    flex: 1;
    padding: 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }

  .subject-row input:focus { border-color: var(--blue); }

  /* Loading */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    border-radius: var(--radius);
    width: 500px;
    max-width: 95vw;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
  }

  .modal-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-header h2 {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px 8px;
    border-radius: 4px;
  }
  .modal-close:hover { background: var(--bg); }

  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 0.88rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .form-group input:focus,
  .form-group textarea:focus { border-color: var(--primary); }

  .form-group .hint {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--text);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    z-index: 300;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #aaa; }

  /* Responsive */
  @media (max-width: 768px) {
    .main-layout { flex-direction: column; height: auto; }
    .jobs-panel { width: 100%; min-width: unset; max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
    .detail-panel { padding: 16px; }
    .search-row { flex-wrap: wrap; }
    .search-row select { width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1><span class="logo">JUMP</span> 求職助手</h1>
    <div class="header-subtitle">自動分析職位要求 · 生成繁體中文求職信</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div class="model-badge" id="modelBadge" title="AI model in use">⚙ loading…</div>
    <button id="profileBtn" onclick="openProfile()">
      <div class="profile-dot" id="profileDot"></div>
      我的求職檔案
    </button>
  </div>
</header>

<div class="search-section">
  <div class="search-row">
    <input id="searchInput" type="text" placeholder="搜尋職位、公司或關鍵字…" onkeydown="if(event.key==='Enter') doSearch()">
    <select id="industrySelect">
      <option value="">所有行業</option>
      <option value="4">醫療/美容護理</option>
      <option value="32">社會服務/非牟利機構</option>
      <option value="10">教育</option>
      <option value="15">銀行/金融</option>
      <option value="21">資訊科技</option>
      <option value="1">行政/人力資源</option>
      <option value="3">廣告/公共關係</option>
      <option value="5">建築/測量/工程</option>
      <option value="6">會計/審計</option>
      <option value="7">物流/運輸</option>
      <option value="8">酒店/飲食</option>
      <option value="9">保險</option>
      <option value="11">法律</option>
      <option value="12">市場推廣/銷售</option>
      <option value="14">零售</option>
      <option value="16">製造業</option>
    </select>
    <button class="btn btn-primary" onclick="doSearch()">搜尋</button>
  </div>
</div>

<div class="main-layout">
  <!-- Jobs panel -->
  <div class="jobs-panel" id="jobsPanel">
    <div class="panel-tabs" id="panelTabs">
      <div class="panel-tab active" id="tab-search" onclick="showTab('search')">搜尋結果</div>
      <div class="panel-tab" id="tab-starred" onclick="showTab('starred')">★ 已加星 <span class="tab-badge" id="starredBadge" style="display:none">0</span></div>
      <div class="panel-tab" id="tab-history" onclick="showTab('history')">📨 已發送 <span class="tab-badge" id="historyBadge" style="display:none">0</span></div>
    </div>
    <div class="jobs-panel-header" id="jobsPanelHeader">輸入關鍵字搜尋職位</div>
    <div id="jobsList"></div>
    <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
      <button class="btn btn-secondary" onclick="loadMore()">載入更多</button>
    </div>
    <div id="starredList" style="display:none"></div>
    <div id="historyList" style="display:none"></div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">🔍</div>
      <h3>搜尋並選擇職位</h3>
      <p>在左方搜尋職位，點擊後系統將自動分析職位要求<br>並生成個人化求職信</p>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-header">
      <h2>📋 我的求職檔案</h2>
      <button class="modal-close" onclick="closeProfile()">✕</button>
    </div>
    <div class="modal-body">
      <div id="resumeUploadArea" style="border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;margin-bottom:16px;cursor:pointer;transition:all 0.2s" onclick="document.getElementById('resumeFileInput').click()" ondragover="event.preventDefault();this.style.borderColor='var(--primary)'" ondragleave="this.style.borderColor='var(--border)'" ondrop="handleResumeDrop(event)">
        <input type="file" id="resumeFileInput" accept=".pdf,.docx" style="display:none" onchange="uploadResume(this.files[0])">
        <div id="resumeUploadContent">
          <div style="font-size:2rem;margin-bottom:8px">📄</div>
          <div style="font-weight:600;margin-bottom:4px">Upload Resume to Auto-fill</div>
          <div style="font-size:0.82rem;color:var(--text-muted)">Drag & drop or click · PDF or Word (.docx)</div>
        </div>
      </div>
      <p style="font-size:0.88rem;color:var(--text-muted);margin-bottom:16px">
        Or fill in manually. Data is stored locally only.
      </p>
      <div class="form-group">
        <label>姓名</label>
        <input id="p_name" type="text" placeholder="例：Chan Tai Man">
      </div>
      <div style="display:flex;gap:12px">
        <div class="form-group" style="flex:1">
          <label>電話</label>
          <input id="p_phone" type="tel" placeholder="例：+852 9123 4567">
        </div>
        <div class="form-group" style="flex:1">
          <label>電郵</label>
          <input id="p_email" type="email" placeholder="例：chan@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>學歷</label>
        <textarea id="p_education" rows="3" placeholder="例：香港大學 工商管理學士 (2020)&#10;香港理工大學 副學士 (2018)"></textarea>
      </div>
      <div class="form-group">
        <label>工作經驗</label>
        <textarea id="p_experience" rows="7" placeholder="例：數學教師｜XX中學｜2021–至今&#10;- 負責中四至中六數學科教學&#10;- 擔任班主任&#10;&#10;教學助理｜YY小學｜2019–2021&#10;- 協助課堂教學及批改作業"></textarea>
      </div>
      <div class="form-group">
        <label>技能</label>
        <textarea id="p_skills" rows="3" placeholder="例：Microsoft Office, Python, Cantonese, Mandarin, English, 項目管理"></textarea>
      </div>
      <div class="form-group">
        <label>其他資料</label>
        <textarea id="p_other" rows="3" placeholder="例：香港駕駛執照、教師註冊證、可即時上班、普通話普通等級"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeProfile()">取消</button>
      <button class="btn btn-primary" onclick="saveProfile()">儲存檔案</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// State
let state = {
  jobs: [],
  currentPage: 1,
  hasNextPage: false,
  activeJobId: null,
  lastQuery: { q: '', industryId: '' },
  checklistData: [],
  coverLetter: '',
  jobEmail: '',
  jobTitle: '',
  jobCompany: '',
  jobUrl: '',
  resumeFile: null,      // File object from upload
  resumeName: '',        // original filename
  activeTab: 'search'
};

// ── Starred / Bookmarks ──────────────────────────────────────────────────
function getStarred() { return JSON.parse(localStorage.getItem('jumpStarred') || '[]'); }
function saveStarred(arr) { localStorage.setItem('jumpStarred', JSON.stringify(arr)); }

function isStarred(adId) { return getStarred().some(j => j.adId === adId); }

function toggleStar(adId, e) {
  e.stopPropagation();
  const arr = getStarred();
  const idx = arr.findIndex(j => j.adId === adId);
  if (idx === -1) {
    // Find job data from current list
    const job = state.jobs.find(j => j.adId === adId);
    if (job) arr.push({ adId: job.adId, title: job.title, company: job.company, date: job.date });
    showToast('★ 已加入書籤');
  } else {
    arr.splice(idx, 1);
    showToast('已移除書籤');
  }
  saveStarred(arr);
  updateTabBadges();
  // Update star button appearance in both search and starred lists
  document.querySelectorAll(`#card-${adId} .star-btn, #scard-${adId} .star-btn`).forEach(btn => {
    btn.classList.toggle('starred', isStarred(adId));
    btn.title = isStarred(adId) ? 'Remove bookmark' : 'Bookmark';
  });
  // Re-render starred list if visible
  if (state.activeTab === 'starred') renderStarredList();
}

function renderStarredList() {
  const el = document.getElementById('starredList');
  const arr = getStarred();
  if (arr.length === 0) {
    el.innerHTML = `<div class="empty-panel"><div class="icon">☆</div>尚未加入書籤<br><small>在搜尋結果中點擊 ★ 即可收藏</small></div>`;
    return;
  }
  el.innerHTML = arr.slice().reverse().map(job => `
    <div class="job-card${job.adId === state.activeJobId ? ' active' : ''}" id="scard-${job.adId}" onclick="loadJobDetail(${JSON.stringify(job).split('"').join('&quot;')})">
      <div style="padding-right:28px">
        <div class="job-card-title">${escHtml(job.title)}</div>
        <div class="job-card-company">${escHtml(job.company || '—')}</div>
        <div class="job-card-date">${escHtml(job.date || '')}</div>
      </div>
      <button class="star-btn starred" title="Remove bookmark" onclick="toggleStar('${escAttr(job.adId)}', event)">★</button>
    </div>
  `).join('');
}

// ── Send History ─────────────────────────────────────────────────────────
function getSendHistory() { return JSON.parse(localStorage.getItem('jumpSendHistory') || '[]'); }
function saveSendHistory(arr) { localStorage.setItem('jumpSendHistory', JSON.stringify(arr)); }

function recordSendHistory() {
  const arr = getSendHistory();
  arr.push({
    adId: state.activeJobId,
    title: state.jobTitle,
    company: state.jobCompany,
    email: document.getElementById('gmailTo')?.value?.trim() || state.jobEmail,
    sentAt: new Date().toISOString()
  });
  saveSendHistory(arr);
  updateTabBadges();
  if (state.activeTab === 'history') renderHistoryList();
  showToast('📨 已記錄發送記錄');
}

function renderHistoryList() {
  const el = document.getElementById('historyList');
  const arr = getSendHistory();
  if (arr.length === 0) {
    el.innerHTML = `<div class="empty-panel"><div class="icon">📨</div>尚無發送記錄<br><small>點擊「一鍵開啟 Gmail」後自動記錄</small></div>`;
    return;
  }
  el.innerHTML = arr.slice().reverse().map(h => {
    const d = new Date(h.sentAt);
    const dateStr = d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    const job = { adId: h.adId, title: h.title, company: h.company };
    return `
      <div class="history-item${h.adId === state.activeJobId ? ' active' : ''}" onclick="loadJobDetail(${JSON.stringify(job).split('"').join('&quot;')})">
        <span class="history-sent-badge">📨 已發送</span>
        <div class="job-card-title">${escHtml(h.title || '—')}</div>
        <div class="job-card-company">${escHtml(h.company || '—')}</div>
        ${h.email ? `<div class="job-card-date" style="color:var(--blue)">✉️ ${escHtml(h.email)}</div>` : ''}
        <div class="history-date">發送時間：${dateStr}</div>
      </div>
    `;
  }).join('');
}

// ── Tabs ─────────────────────────────────────────────────────────────────
function showTab(tab) {
  state.activeTab = tab;
  ['search', 'starred', 'history'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  const header = document.getElementById('jobsPanelHeader');
  const jobsList = document.getElementById('jobsList');
  const loadMore = document.getElementById('loadMoreWrap');
  const starredList = document.getElementById('starredList');
  const historyList = document.getElementById('historyList');

  header.style.display = tab === 'search' ? '' : 'none';
  jobsList.style.display = tab === 'search' ? '' : 'none';
  loadMore.style.display = tab === 'search' && state.hasNextPage ? 'block' : 'none';
  starredList.style.display = tab === 'starred' ? '' : 'none';
  historyList.style.display = tab === 'history' ? '' : 'none';

  if (tab === 'starred') renderStarredList();
  if (tab === 'history') renderHistoryList();
}

function updateTabBadges() {
  const starredCount = getStarred().length;
  const historyCount = getSendHistory().length;
  const sb = document.getElementById('starredBadge');
  const hb = document.getElementById('historyBadge');
  if (sb) { sb.textContent = starredCount; sb.style.display = starredCount ? '' : 'none'; }
  if (hb) { hb.textContent = historyCount; hb.style.display = historyCount ? '' : 'none'; }
}

// Profile
function loadProfile() {
  const p = JSON.parse(localStorage.getItem('jumpProfile') || '{}');
  if (p.name)       document.getElementById('p_name').value = p.name;
  if (p.phone)      document.getElementById('p_phone').value = p.phone;
  if (p.email)      document.getElementById('p_email').value = p.email;
  if (p.education)  document.getElementById('p_education').value = p.education;
  if (p.experience) document.getElementById('p_experience').value = p.experience;
  if (p.skills)     document.getElementById('p_skills').value = p.skills;
  if (p.other)      document.getElementById('p_other').value = p.other;
  updateProfileDot(!!p.name);
  return p;
}

function saveProfile() {
  const p = {
    name:       document.getElementById('p_name').value.trim(),
    phone:      document.getElementById('p_phone').value.trim(),
    email:      document.getElementById('p_email').value.trim(),
    education:  document.getElementById('p_education').value.trim(),
    experience: document.getElementById('p_experience').value.trim(),
    skills:     document.getElementById('p_skills').value.trim(),
    other:      document.getElementById('p_other').value.trim()
  };
  localStorage.setItem('jumpProfile', JSON.stringify(p));
  updateProfileDot(!!p.name);
  closeProfile();
  showToast('✅ 求職檔案已儲存');
}

function updateProfileDot(isSet) {
  const dot = document.getElementById('profileDot');
  dot.className = 'profile-dot' + (isSet ? ' set' : '');
}

function handleResumeDrop(e) {
  e.preventDefault();
  document.getElementById('resumeUploadArea').style.borderColor = 'var(--border)';
  const file = e.dataTransfer.files[0];
  if (file) uploadResume(file);
}

async function uploadResume(file) {
  if (!file) return;
  // Keep the file object so we can offer it as a download when sending
  state.resumeFile = file;
  state.resumeName = file.name;
  const area = document.getElementById('resumeUploadArea');
  const content = document.getElementById('resumeUploadContent');

  content.innerHTML = `<div class="loading" style="justify-content:center"><div class="spinner"></div>Reading resume with AI…</div>`;
  area.style.borderColor = 'var(--primary)';

  try {
    const formData = new FormData();
    formData.append('resume', file);

    const resp = await fetch('/api/parse-resume', { method: 'POST', body: formData });
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    // Fill in the form fields
    if (data.name)       document.getElementById('p_name').value = data.name;
    if (data.phone)      document.getElementById('p_phone').value = data.phone;
    if (data.email)      document.getElementById('p_email').value = data.email;
    if (data.education)  document.getElementById('p_education').value = data.education;
    if (data.experience) document.getElementById('p_experience').value = data.experience;
    if (data.skills)     document.getElementById('p_skills').value = data.skills;
    if (data.other)      document.getElementById('p_other').value = data.other;

    content.innerHTML = `<div style="color:var(--success);font-weight:600">✅ ${escHtml(file.name)} — profile filled!</div><div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Review and edit below before saving</div>`;
    area.style.borderColor = 'var(--success)';
  } catch (err) {
    content.innerHTML = `<div style="color:#e74c3c;font-weight:600">⚠️ ${escHtml(err.message)}</div><div style="font-size:0.8rem;color:var(--text-muted);margin-top:4px">Click to try again</div>`;
    area.style.borderColor = '#e74c3c';
  }
}

function openProfile() {
  loadProfile();
  document.getElementById('profileModal').classList.add('open');
}

function closeProfile() {
  document.getElementById('profileModal').classList.remove('open');
}

// Search
async function doSearch(resetPage = true) {
  const q = document.getElementById('searchInput').value.trim();
  const industryId = document.getElementById('industrySelect').value;

  if (!q && !industryId) {
    showToast('請輸入搜尋關鍵字或選擇行業');
    return;
  }

  if (resetPage) {
    state.jobs = [];
    state.currentPage = 1;
    state.lastQuery = { q, industryId };
  }

  const listEl = document.getElementById('jobsList');
  const headerEl = document.getElementById('jobsPanelHeader');

  if (resetPage) {
    listEl.innerHTML = `<div class="loading"><div class="spinner"></div>搜尋中…</div>`;
  }

  try {
    const params = new URLSearchParams({ q, industryId, page: state.currentPage });
    const resp = await fetch(`/api/search?${params}`);
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    if (resetPage) {
      state.jobs = data.jobs;
      listEl.innerHTML = '';
    } else {
      state.jobs = [...state.jobs, ...data.jobs];
    }

    state.hasNextPage = data.hasNextPage;
    headerEl.textContent = `找到 ${state.jobs.length} 個職位`;

    if (state.jobs.length === 0) {
      listEl.innerHTML = `<div class="loading" style="justify-content:center;padding:30px;flex-direction:column;gap:8px;">
        <div style="font-size:2rem">😕</div>
        <div>未找到相關職位</div>
      </div>`;
    } else {
      if (resetPage) {
        renderJobList();
      } else {
        appendJobList(data.jobs);
      }
    }

    document.getElementById('loadMoreWrap').style.display = state.hasNextPage ? 'block' : 'none';
  } catch (err) {
    listEl.innerHTML = `<div class="loading" style="color:#e74c3c;flex-direction:column;gap:8px;padding:20px">
      <div>⚠️ 搜尋失敗</div>
      <div style="font-size:0.8rem">${err.message}</div>
    </div>`;
  }
}

function renderJobList() {
  const listEl = document.getElementById('jobsList');
  listEl.innerHTML = '';
  state.jobs.forEach(job => {
    listEl.appendChild(createJobCard(job));
  });
}

function appendJobList(jobs) {
  const listEl = document.getElementById('jobsList');
  jobs.forEach(job => {
    listEl.appendChild(createJobCard(job));
  });
}

function createJobCard(job) {
  const el = document.createElement('div');
  el.className = 'job-card' + (job.adId === state.activeJobId ? ' active' : '');
  el.id = `card-${job.adId}`;
  const starred = isStarred(job.adId);
  el.innerHTML = `
    <div style="padding-right:28px">
      <div class="job-card-title">${escHtml(job.title)}</div>
      <div class="job-card-company">${escHtml(job.company || '—')}</div>
      <div class="job-card-date">${escHtml(job.date || '')}</div>
    </div>
    <button class="star-btn${starred ? ' starred' : ''}" title="${starred ? 'Remove bookmark' : 'Bookmark'}" onclick="toggleStar('${escAttr(job.adId)}', event)">★</button>
  `;
  el.addEventListener('click', () => loadJobDetail(job));
  return el;
}

async function loadMore() {
  state.currentPage++;
  await doSearch(false);
}

// Job detail
async function loadJobDetail(job) {
  // Update active card
  document.querySelectorAll('.job-card').forEach(c => c.classList.remove('active'));
  const card = document.getElementById(`card-${job.adId}`);
  if (card) card.classList.add('active');
  state.activeJobId = job.adId;

  const detailPanel = document.getElementById('detailPanel');
  detailPanel.innerHTML = `
    <div class="loading"><div class="spinner"></div>載入職位詳情中…</div>
  `;

  try {
    // Fetch job detail
    const resp = await fetch(`/api/job/${job.adId}`);
    const jobData = await resp.json();

    if (jobData.error) throw new Error(jobData.error);

    state.jobTitle = jobData.title || job.title;
    state.jobCompany = jobData.company || job.company;
    state.jobEmail = jobData.email || '';
    state.jobUrl = jobData.url;
    state.jobAddress = '';
    state.jobPrincipal = '';

    // Render job header
    detailPanel.innerHTML = renderJobHeader(jobData, job);

    // Parse requirements
    renderParsingSection(detailPanel);
    // Run lookup and parsing in parallel
    const [_, lookupData] = await Promise.all([
      parseJobRequirements(jobData, detailPanel),
      lookupCompanyInfo(state.jobCompany)
    ]);
    if (lookupData) {
      // Prefer the address extracted directly from the job posting (set by parseJobRequirements)
      // Fall back to the Google Search lookup address
      if (!state.jobAddress) state.jobAddress = lookupData.address || '';
      state.jobPrincipal = lookupData.principal || '';
      renderLookupInfo(lookupData);
    }
    // Now generate cover letter with both lookup + parsed requirements available
    await generateCoverLetter();

  } catch (err) {
    detailPanel.innerHTML = `
      <div class="card">
        <div class="card-body" style="color:#e74c3c;padding:20px">
          ⚠️ 載入失敗：${escHtml(err.message)}
        </div>
      </div>
    `;
  }
}

function renderJobHeader(jobData, job) {
  const title = escHtml(jobData.title || job.title || '');
  const company = escHtml(jobData.company || job.company || '');
  const email = jobData.email;
  const url = jobData.url;

  let metaChips = '';
  const meta = jobData.meta || {};
  const importantKeys = ['薪酬', '工作地區', '僱用形式', '教育程度', 'Salary', 'Location', 'Employment Type'];
  for (const [k, v] of Object.entries(meta)) {
    if (importantKeys.some(ik => k.includes(ik)) && v && v !== '—') {
      metaChips += `<div class="meta-chip">📍 ${escHtml(k)}: ${escHtml(v)}</div>`;
    }
  }

  if (email) {
    metaChips += `<div class="meta-chip email" onclick="setEmail('${escAttr(email)}')">✉️ ${escHtml(email)}</div>`;
  }

  const enquiriesHtml = jobData.enquiries && !email
    ? `<div style="margin-top:10px;padding:10px 12px;background:#fff8e1;border:1px solid #ffe082;border-radius:8px;font-size:0.85rem;color:#6d4c00">
        📬 <strong>Application method:</strong> ${escHtml(jobData.enquiries)}
       </div>`
    : '';

  return `
    <div class="job-header-card" id="jobHeader">
      <h2>${title}</h2>
      <div class="company-name">🏢 ${company}</div>
      ${metaChips ? `<div class="job-meta-grid">${metaChips}</div>` : ''}
      ${enquiriesHtml}
      ${url ? `<a class="view-original-link" href="${escAttr(url)}" target="_blank">🔗 查看原始廣告</a>` : ''}
    </div>
    <div id="schoolInfoSection"></div>
    <div id="dynamicSections"></div>
  `;
}

function renderParsingSection(detailPanel) {
  // School info lives in its own container so it is NEVER overwritten by requirements rendering
  const schoolSection = document.getElementById('schoolInfoSection');
  if (schoolSection) {
    schoolSection.innerHTML = `
      <div class="card" id="schoolInfoCard">
        <div class="card-header">
          <h3>🏫 School / Organisation Info</h3>
          <div class="loading" style="padding:0" id="schoolSpinner"><div class="spinner" style="width:16px;height:16px;border-width:2px"></div></div>
        </div>
        <div id="lookupCard">
          <div class="card-body" style="color:var(--text-muted);font-size:0.88rem">Looking up school info…</div>
        </div>
      </div>
    `;
  }

  const dynSections = document.getElementById('dynamicSections');
  if (!dynSections) return;
  dynSections.innerHTML = `
    <div class="card">
      <div class="card-header"><h3>📋 職位要求分析</h3></div>
      <div class="card-body">
        <div class="loading"><div class="spinner"></div>AI 分析職位要求中…</div>
      </div>
    </div>
  `;
}

async function parseJobRequirements(jobData, detailPanel) {
  try {
    const resp = await fetch('/api/parse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jobText: jobData.bodyText,
        sections: jobData.sections,
        title: jobData.title,
        company: jobData.company
      })
    });
    const parsed = await resp.json();

    if (parsed.error) {
      const errMsg = parsed.error.includes('apiKey') || parsed.error.includes('API_KEY') || parsed.error.includes('auth')
        ? 'Gemini API Key 未設定。請在 .env 檔案中設定 GEMINI_API_KEY（免費：aistudio.google.com/apikey）'
        : parsed.error;
      throw new Error(errMsg);
    }

    state.checklistData = parsed.requirements || [];
    // Use address from the job posting itself (most accurate)
    if (parsed.schoolAddress) state.jobAddress = parsed.schoolAddress;
    if (parsed.contactEmail && !state.jobEmail) {
      state.jobEmail = parsed.contactEmail;
      // Immediately update header chip too
      const existingChips = document.querySelector('.job-meta-grid');
      if (existingChips && !existingChips.querySelector('.meta-chip.email')) {
        const chip = document.createElement('div');
        chip.className = 'meta-chip email';
        chip.innerHTML = `✉️ ${escHtml(parsed.contactEmail)}`;
        chip.onclick = () => setEmail(parsed.contactEmail);
        existingChips.appendChild(chip);
      }
    }

    const dynSections = document.getElementById('dynamicSections');
    if (!dynSections) return;

    // Render requirements checklist
    dynSections.innerHTML = renderChecklist(parsed) + `
      <div class="card" id="coverLetterCard">
        <div class="card-header">
          <h3>✉️ 求職信</h3>
          <div class="cover-letter-actions">
            <button class="btn btn-copy" onclick="regenerateLetter()">🔄 重新生成</button>
            <button class="btn btn-copy" onclick="copyLetter()">📋 複製</button>
          </div>
        </div>
        <div class="card-body">
          <div class="loading" id="letterLoading"><div class="spinner"></div>AI 生成求職信中…</div>
          <div id="coverLetterDisplay" style="display:none"></div>
          <textarea id="coverLetterText"></textarea>
          <div class="gmail-section" id="gmailSection" style="display:none">
            <div class="gmail-to-row">
              <label>收件人</label>
              <input id="gmailTo" type="email" placeholder="招聘負責人電郵地址" value="${escAttr(state.jobEmail)}">
            </div>
            <div class="subject-row">
              <label>主&emsp;&emsp;題</label>
              <input id="gmailSubject" type="text" value="">
            </div>
            <button class="btn btn-gmail" onclick="openGmail()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.910 1.528-1.145C21.69 2.28 24 3.434 24 5.457z"/></svg>
              一鍵開啟 Gmail 發送求職信
            </button>
          </div>
        </div>
      </div>
    `;

    updateChecklistProgress();
    // Cover letter is generated later, after lookup also completes

  } catch (err) {
    const dynSections = document.getElementById('dynamicSections');
    if (dynSections) {
      dynSections.innerHTML = `
        <div class="card">
          <div class="card-body" style="color:#e74c3c;padding:20px">
            ⚠️ AI 分析失敗：${escHtml(err.message)}
          </div>
        </div>
      `;
    }
  }
}

function renderChecklist(parsed) {
  const requirements = parsed.requirements || [];
  if (requirements.length === 0) {
    return `<div class="card">
      <div class="card-header"><h3>📋 職位要求</h3></div>
      <div class="card-body"><p style="color:var(--text-muted);font-size:0.9rem">未能提取職位要求，請查看原始廣告。</p></div>
    </div>`;
  }

  const items = requirements.map((r, i) => `
    <li class="checklist-item" id="ci-${i}" onclick="toggleCheck(${i})">
      <input type="checkbox" id="cb-${i}" onchange="updateChecklistProgress()" onclick="event.stopPropagation()">
      <div class="checklist-category">${escHtml(r.category || '要求')}</div>
      <div class="checklist-item-text">${escHtml(r.item)}</div>
    </li>
  `).join('');

  const salaryChip = parsed.salaryRange ? `<div class="meta-chip">💰 ${escHtml(parsed.salaryRange)}</div>` : '';
  const locChip = parsed.location ? `<div class="meta-chip">📍 ${escHtml(parsed.location)}</div>` : '';

  return `
    <div class="card">
      <div class="card-header">
        <h3>📋 職位要求核對清單</h3>
        <div class="checklist-progress" id="checklistProgress">0 / ${requirements.length}</div>
      </div>
      <div class="card-body">
        ${(salaryChip || locChip) ? `<div class="job-meta-grid" style="margin-bottom:14px">${salaryChip}${locChip}</div>` : ''}
        <div class="progress-bar-wrap" style="margin-bottom:14px">
          <div class="progress-bar" id="progressBar" style="width:0%"></div>
        </div>
        <ul class="checklist" id="checklist">${items}</ul>
      </div>
    </div>
  `;
}

function toggleCheck(i) {
  const cb = document.getElementById(`cb-${i}`);
  const item = document.getElementById(`ci-${i}`);
  cb.checked = !cb.checked;
  item.classList.toggle('checked', cb.checked);
  updateChecklistProgress();
}

function updateChecklistProgress() {
  const items = document.querySelectorAll('#checklist .checklist-item');
  if (!items.length) return;
  const checked = document.querySelectorAll('#checklist input[type=checkbox]:checked').length;
  const total = items.length;
  const pct = Math.round((checked / total) * 100);
  const progressEl = document.getElementById('checklistProgress');
  const barEl = document.getElementById('progressBar');
  if (progressEl) progressEl.textContent = `${checked} / ${total}`;
  if (barEl) {
    barEl.style.width = pct + '%';
    barEl.style.background = pct === 100 ? 'var(--success)' : pct > 50 ? 'var(--warning)' : 'var(--primary)';
  }
  // Sync item checked class
  items.forEach((item, idx) => {
    const cb = document.getElementById(`cb-${idx}`);
    if (cb) item.classList.toggle('checked', cb.checked);
  });
}

async function lookupCompanyInfo(company) {
  try {
    const resp = await fetch('/api/lookup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company })
    });
    return await resp.json();
  } catch { return null; }
}

function renderLookupInfo(data) {
  const headerSpinner = document.getElementById('schoolSpinner');
  if (headerSpinner) headerSpinner.style.display = 'none';
  const card = document.getElementById('lookupCard');
  if (!card) return;

  const hasInfo = data.address || data.principal || data.banding || data.district || data.school_type;
  if (!hasInfo) {
    card.innerHTML = `<div class="card-body" style="color:var(--text-muted);font-size:0.88rem">找不到相關資料，請手動填寫。</div>`;
    return;
  }

  const displayAddr = state.jobAddress || data.address;
  const addrSource = state.jobAddress ? '(from job ad)' : '(AI lookup)';

  function infoRow(icon, label, value, copyVal) {
    if (!value) return '';
    return `
      <div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:1.3rem;line-height:1;flex-shrink:0;margin-top:2px">${icon}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:3px">${label}</div>
          <div style="font-size:0.95rem;font-weight:600;color:var(--text);line-height:1.4;word-break:break-word">${value}</div>
        </div>
        ${copyVal ? `<button class="btn btn-copy" style="font-size:0.75rem;padding:4px 10px;flex-shrink:0;align-self:center" onclick="copyText('${escAttr(copyVal)}')">Copy</button>` : ''}
      </div>`;
  }

  card.innerHTML = `
    <div class="card-body" style="padding:0 16px">
      ${infoRow('👤', 'Principal / Director', escHtml(data.principal), data.principal)}
      ${infoRow('📍', `Address ${addrSource}`, escHtml(displayAddr), displayAddr)}
      ${infoRow('🏫', 'School Type', escHtml(data.school_type), '')}
      ${infoRow('🏅', 'Banding', escHtml(data.banding), '')}
      ${infoRow('📌', 'District', escHtml(data.district), '')}
      ${infoRow('📅', 'Year Founded', data.founded ? `Est. ${escHtml(data.founded)}` : '', '')}
      ${data.website ? `
        <div style="padding:10px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-muted);margin-bottom:3px">🌐 &nbsp;Website</div>
          <a href="${escAttr(data.website)}" target="_blank" style="font-size:0.9rem;color:var(--blue);word-break:break-all">${escHtml(data.website)}</a>
        </div>` : ''}
      <div style="padding:10px 0;font-size:0.75rem;color:var(--text-muted)">
        ⚠️ AI-generated — please verify before sending
      </div>
    </div>
  `;
  updateGmailRecipient();
}

function updateGmailRecipient() {
  const subjectEl = document.getElementById('gmailSubject');
  if (subjectEl && !subjectEl.dataset.edited) {
    subjectEl.value = `Application for the Post of ${state.jobTitle}`;
  }
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('✅ Copied to clipboard'));
}

async function generateCoverLetter() {
  const profile = JSON.parse(localStorage.getItem('jumpProfile') || '{}');
  const requirements = state.checklistData;

  try {
    const resp = await fetch('/api/generate-letter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        jobTitle: state.jobTitle,
        company: state.jobCompany,
        requirements,
        responsibilities: [],
        profile,
        address: state.jobAddress || '',
        principal: state.jobPrincipal || ''
      })
    });
    const data = await resp.json();

    if (data.error) throw new Error(data.error);

    state.coverLetter = data.letter;

    // Extract translated job title from the "Application for the Post of …" line
    const titleMatch = data.letter.match(/Application for the Post of (.+)/i);
    if (titleMatch) state.jobTitle = titleMatch[1].trim();

    // Update model badge to show which model actually generated this letter
    if (data.modelUsed) {
      const badge = document.getElementById('modelBadge');
      if (badge) {
        badge.textContent = '⚙ ' + data.modelUsed;
        badge.title = 'Last used model: ' + data.modelUsed;
      }
    }

    const loadingEl = document.getElementById('letterLoading');
    const displayEl = document.getElementById('coverLetterDisplay');
    const textEl = document.getElementById('coverLetterText');
    const gmailEl = document.getElementById('gmailSection');

    if (loadingEl) loadingEl.style.display = 'none';
    if (textEl) textEl.value = data.letter;
    if (displayEl) {
      displayEl.style.display = 'block';
      displayEl.innerHTML = renderLetterHtml(data.letter);
    }
    if (gmailEl) {
      gmailEl.style.display = 'block';
      // Set default subject using the (now translated) job title
      const subjectEl = document.getElementById('gmailSubject');
      if (subjectEl) subjectEl.value = `Application for the Post of ${state.jobTitle}`;
      // Set email from job
      const toEl = document.getElementById('gmailTo');
      if (toEl && state.jobEmail) toEl.value = state.jobEmail;
    }

  } catch (err) {
    const loadingEl = document.getElementById('letterLoading');
    if (loadingEl) {
      loadingEl.innerHTML = `<span style="color:#e74c3c">⚠️ 生成失敗：${escHtml(err.message)}</span>`;
    }
  }
}

async function regenerateLetter() {
  const loadingEl = document.getElementById('letterLoading');
  const textEl = document.getElementById('coverLetterText');
  const gmailEl = document.getElementById('gmailSection');

  const displayEl2 = document.getElementById('coverLetterDisplay');
  if (loadingEl) { loadingEl.style.display = 'flex'; loadingEl.innerHTML = '<div class="spinner"></div>重新生成中…'; }
  if (displayEl2) displayEl2.style.display = 'none';
  if (gmailEl) gmailEl.style.display = 'none';

  await generateCoverLetter();
}

function renderLetterHtml(text) {
  // Escape HTML then restore newlines, and center the "Application for the Post of" line
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  return escaped.replace(
    /(Application for the Post of .+)/g,
    '<span class="letter-subject">$1</span>'
  );
}

function copyLetter() {
  const textEl = document.getElementById('coverLetterText');
  if (!textEl || !textEl.value) return;
  navigator.clipboard.writeText(textEl.value).then(() => showToast('✅ 求職信已複製到剪貼板'));
}

function openGmail() {
  const to = document.getElementById('gmailTo')?.value?.trim() || '';
  const subject = document.getElementById('gmailSubject')?.value?.trim() || `Application for the Post of ${state.jobTitle}`;
  const body = document.getElementById('coverLetterText')?.value || state.coverLetter;

  if (!body) {
    showToast('⚠️ 請等待求職信生成');
    return;
  }

  const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1${to ? `&to=${encodeURIComponent(to)}` : ''}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(gmailUrl, '_blank');
  recordSendHistory();
}

function setEmail(email) {
  state.jobEmail = email;
  const toEl = document.getElementById('gmailTo');
  if (toEl) toEl.value = email;
  showToast(`✅ 收件人已設為 ${email}`);
}

// Utils
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.getElementById('profileModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeProfile();
});

// Init
loadProfile();
updateTabBadges();
fetch('/api/model').then(r => r.json()).then(data => {
  const el = document.getElementById('modelBadge');
  if (el) {
    el.textContent = '⚙ ' + data.primary;
    el.title = 'Model chain: ' + data.chain.join(' → ');
  }
}).catch(() => {});
</script>
